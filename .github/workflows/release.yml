name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: JobBoards-windows-x64
            exe_name: JobBoards.exe
          - os: macos-latest
            asset_name: JobBoards-macos-arm64
            exe_name: JobBoards
          - os: ubuntu-latest
            asset_name: JobBoards-linux-x64
            exe_name: JobBoards

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build executable
        run: python build.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.exe_name }}" -DestinationPath "dist/${{ matrix.asset_name }}.zip"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "dist/${{ matrix.exe_name }}"
          cd dist && zip -9 "../dist/${{ matrix.asset_name }}.zip" "${{ matrix.exe_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}.zip

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
